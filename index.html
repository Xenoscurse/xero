<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MovieStream - Watch Movies Free</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        /* Search Section */
        .search-section {
            max-width: 800px;
            margin: -1.5rem auto 0;
            padding: 0 1rem;
        }

        .search-box {
            background: #1e1e1e;
            border-radius: 50px;
            padding: 0.5rem 1rem;
            display: flex;
            gap: 0.5rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border: 1px solid #333;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            color: #fff;
            outline: none;
        }

        .search-box input::placeholder {
            color: #666;
        }

        .search-box button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 0 2rem;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Movie Results */
        .movie-grid {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .movie-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #333;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-color: #667eea;
        }

        .movie-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #2a2a2a;
        }

        .movie-info {
            padding: 0.75rem;
        }

        .movie-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-year {
            font-size: 0.8rem;
            color: #888;
        }

        .movie-rating {
            font-size: 0.75rem;
            color: #f5c518;
            margin-top: 0.25rem;
        }

        /* Video Player Section */
        .player-container {
            max-width: 1200px;
            margin: 1rem auto;
            padding: 0 1rem;
            display: none;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .player-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-btn {
            background: #333;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: #555;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Error Message */
        .error-message {
            text-align: center;
            padding: 2rem;
            color: #ff6b6b;
            background: #1a1a1a;
            border-radius: 12px;
            margin: 1rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            color: #555;
            font-size: 0.8rem;
            border-top: 1px solid #222;
            margin-top: 2rem;
        }

        /* Back to Browse Button */
        .back-btn {
            background: #333;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 MovieStream</h1>
        <p>Search any movie and watch instantly</p>
    </div>

    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search for a movie... (e.g., Inception, Avengers, The Matrix)" onkeypress="if(event.key === 'Enter') searchMovies()">
            <button onclick="searchMovies()">Search</button>
        </div>
    </div>

    <div id="results"></div>

    <div class="footer">
        <p>Powered by TMDB & VidSrc | For educational purposes only</p>
    </div>

    <script>
        // IMPORTANT: Replace this with your actual TMDB API key
        // Get a free key at: https://www.themoviedb.org/signup
        const TMDB_API_KEY = 'YOUR_TMDB_API_KEY_HERE';
        
        const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
        const TMDB_IMAGE_BASE = 'https://image.tmdb.org/t/p/w500';
        
        // VidSrc embed URL patterns (multiple sources for redundancy)
        const VIDEO_SOURCES = [
            (id) => `https://vidsrc.dev/embed/movie/${id}`,
            (id) => `https://vidsrc.net/embed/movie/${id}`,
            (id) => `https://vidsrc.to/embed/movie/${id}`,
            (id) => `https://embed.su/embed/movie/${id}`,
            (id) => `https://2embed.sx/embed/movie/${id}`
        ];
        
        let currentMovies = [];
        let isPlaying = false;

        async function searchMovies() {
            const query = document.getElementById('searchInput').value.trim();
            
            if (!query) {
                showError('Please enter a movie name');
                return;
            }
            
            if (!TMDB_API_KEY || TMDB_API_KEY === 'YOUR_TMDB_API_KEY_HERE') {
                showError('Please set your TMDB API key in the code. Get a free key from https://www.themoviedb.org/signup');
                return;
            }
            
            showLoading();
            
            try {
                const url = `${TMDB_BASE_URL}/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=en-US&page=1`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    currentMovies = data.results.slice(0, 20); // Show top 20 results
                    displayMovies(currentMovies);
                } else {
                    showError('No movies found. Try a different search term.');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to search movies. Check your API key or internet connection.');
            }
        }
        
        function displayMovies(movies) {
            isPlaying = false;
            
            const html = `
                <div class="movie-grid">
                    ${movies.map(movie => `
                        <div class="movie-card" onclick="playMovie(${movie.id}, '${escapeHtml(movie.title)}')">
                            <img class="movie-poster" src="${movie.poster_path ? TMDB_IMAGE_BASE + movie.poster_path : 'https://via.placeholder.com/300x450?text=No+Poster'}" alt="${escapeHtml(movie.title)}">
                            <div class="movie-info">
                                <div class="movie-title">${escapeHtml(movie.title)}</div>
                                <div class="movie-year">${movie.release_date ? movie.release_date.split('-')[0] : 'N/A'}</div>
                                <div class="movie-rating">⭐ ${movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A'}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            document.getElementById('results').innerHTML = html;
        }
        
        function playMovie(movieId, movieTitle) {
            isPlaying = true;
            
            // Try multiple video sources (first one that works usually loads)
            const embedUrls = VIDEO_SOURCES.map(source => source(movieId));
            const primaryUrl = embedUrls[0];
            
            const html = `
                <div class="player-container" id="playerContainer" style="display: block;">
                    <div class="player-header">
                        <div class="player-title">🎬 Now Playing: ${escapeHtml(movieTitle)}</div>
                        <div>
                            <button class="back-btn" onclick="searchMovies()">🔍 New Search</button>
                            <button class="close-btn" onclick="closePlayer()">✕ Close Player</button>
                        </div>
                    </div>
                    <div class="video-wrapper">
                        <iframe 
                            src="${primaryUrl}"
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    <div style="margin-top: 1rem; padding: 0.5rem; background: #1a1a1a; border-radius: 8px; font-size: 0.8rem; color: #888; text-align: center;">
                        ⚡ If the video doesn't load, try refreshing or <a href="#" onclick="tryAlternateSource(${movieId}, '${escapeHtml(movieTitle)}'); return false;" style="color: #667eea;">click here to try another source</a>
                    </div>
                </div>
                <div class="movie-grid" id="movieGridHidden" style="display: none;"></div>
            `;
            
            document.getElementById('results').innerHTML = html;
            
            // Scroll to player
            setTimeout(() => {
                const player = document.getElementById('playerContainer');
                if (player) player.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }
        
        function tryAlternateSource(movieId, movieTitle) {
            // Get all possible sources
            const embedUrls = VIDEO_SOURCES.map(source => source(movieId));
            let sourceIndex = 0;
            
            // Create a message
            const currentIframe = document.querySelector('.video-wrapper iframe');
            if (currentIframe && sourceIndex < embedUrls.length - 1) {
                sourceIndex++;
                currentIframe.src = embedUrls[sourceIndex];
                showTempMessage('Trying alternative video source...');
            }
        }
        
        function showTempMessage(message) {
            const msgDiv = document.createElement('div');
            msgDiv.style.cssText = 'position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 8px; z-index: 1000; animation: fadeOut 3s forwards;';
            msgDiv.textContent = message;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 3000);
        }
        
        function closePlayer() {
            if (currentMovies.length > 0) {
                displayMovies(currentMovies);
            } else {
                document.getElementById('results').innerHTML = '';
                showTempMessage('Search for a movie to get started');
            }
            isPlaying = false;
        }
        
        function showLoading() {
            document.getElementById('results').innerHTML = '<div class="loading">Searching for movies</div>';
        }
        
        function showError(message) {
            document.getElementById('results').innerHTML = `<div class="error-message">❌ ${message}</div>`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Optional: Popular movies on page load
        async function loadPopularMovies() {
            if (!TMDB_API_KEY || TMDB_API_KEY === 'e70e756fcdc725af4c865ce9dd0053e9') {
                document.getElementById('results').innerHTML = `
                    <div class="error-message">
                        ⚠️ Setup Required: Get your free TMDB API key at 
                        <a href="https://www.themoviedb.org/signup" target="_blank" style="color: #667eea;">themoviedb.org</a>
                        and replace 'YOUR_TMDB_API_KEY_HERE' in the code.
                    </div>
                `;
                return;
            }
            
            showLoading();
            try {
                const url = `${TMDB_BASE_URL}/movie/popular?api_key=${TMDB_API_KEY}&language=en-US&page=1`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    currentMovies = data.results.slice(0, 20);
                    displayMovies(currentMovies);
                }
            } catch (error) {
                console.error('Error loading popular movies:', error);
                document.getElementById('results').innerHTML = `
                    <div class="error-message">
                        ℹ️ Enter a movie name in the search box above to get started.
                    </div>
                `;
            }
        }
        
        // Load popular movies when page loads
        loadPopularMovies();
    </script>
</body>
</html>
